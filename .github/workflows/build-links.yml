name: Build links.json

# Resolves each song to exact Apple / Spotify / Tidal links + duration on the
# CI runner (open internet, no CORS limits) and commits links.json, which the
# static page reads directly. No browser lookups or per-user backend needed.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"   # weekly, Monday 04:17 UTC

permissions:
  contents: write

concurrency:
  group: build-links
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Resolve links
        run: node scripts/build-links.mjs
      - name: Commit links.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add links.json
          if git diff --staged --quiet; then
            echo "No changes to links.json"
          else
            git commit -m "Update links.json"
            git push
          fi
